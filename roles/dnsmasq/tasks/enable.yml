- name: copy config
  copy:
    src: "templates/etc/NetworkManager/NetworkManager.conf"
    dest: "/etc/NetworkManager/NetworkManager.conf"
    owner: root
    group: root
    mode: 0640
  when: "is_rhel or is_suse"


- name: "enable : copy resolv.conf (127.0.0.1)"
  vars:
    local_resolv_server: "127.0.0.1"
  template:
    src: templates/resolv.conf
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: 0755
